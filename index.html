<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarFlix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --netflix-red: #e50914;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #141414;
      color: white;
      overflow-x: hidden;
    }

    /* Menu Lateral */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      width: 240px;
      background: #000;
      padding: 20px 0;
      z-index: 2000;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--netflix-red);
      padding: 0 20px 30px;
    }
    .menu-item {
      padding: 12px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .menu-item:hover { background: #333; }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 240px;
      right: 0;
      height: 70px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      display: flex;
      align-items: center;
      padding: 0 40px;
      z-index: 1500;
    }
    .search-bar {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 10px 20px;
      width: 380px;
      border-radius: 4px;
      color: white;
    }

    /* Hero */
    .hero {
      height: 95vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      padding: 0 60px;
      position: relative;
    }
    .hero-content { max-width: 600px; z-index: 2; }
    .hero h1 { font-size: 4.5rem; margin-bottom: 15px; }
    .hero p { font-size: 1.3rem; margin-bottom: 25px; }

    /* Rows */
    .row {
      padding: 20px 60px;
      margin-top: -80px;
      position: relative;
    }
    .row h2 { margin-bottom: 15px; font-size: 1.6rem; }
    .carousel {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 10px 0;
    }
    .card {
      min-width: 240px;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.4s;
      cursor: pointer;
    }
    .card:hover {
      transform: scale(1.18);
      z-index: 10;
    }
    .card img { width: 100%; display: block; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      width: 80%;
      max-width: 900px;
      background: #1f1f1f;
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Menu Lateral -->
  <div class="sidebar">
    <div class="logo">STARFLIX</div>
    <div class="menu-item"><i class="fas fa-home"></i> Início</div>
    <div class="menu-item"><i class="fas fa-search"></i> Buscar</div>
    <div class="menu-item"><i class="fas fa-film"></i> Filmes</div>
    <div class="menu-item"><i class="fas fa-tv"></i> Séries</div>
    <div class="menu-item"><i class="fas fa-heart"></i> Minha Lista</div>
  </div>

  <header>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar filmes e séries...">
  </header>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1 id="hero-title">Carregando...</h1>
      <p id="hero-overview"></p>
      <button style="background:#fff; color:#000; padding:12px 35px; font-size:1.1rem; border:none; border-radius:4px; cursor:pointer;">
        ▶ Assistir
      </button>
    </div>
  </section>

  <section class="row">
    <h2>Em Alta</h2>
    <div class="carousel" id="trending"></div>
  </section>

  <section class="row">
    <h2>Populares</h2>
    <div class="carousel" id="popular"></div>
  </section>

  <section class="row">
    <h2>Ação</h2>
    <div class="carousel" id="action"></div>
  </section>

  <section class="row">
    <h2>Drama</h2>
    <div class="carousel" id="drama"></div>
  </section>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button onclick="closeModal()" style="position:absolute; top:15px; right:20px; font-size:2rem; background:none; border:none; color:white; cursor:pointer;">×</button>
      <img id="modal-backdrop" style="width:100%; height:420px; object-fit:cover;">
      <div style="padding:25px;">
        <h1 id="modal-title" style="font-size:2.5rem;"></h1>
        <p id="modal-overview"></p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://imdb.iamidiotareyoutoo.com";

    async function fetchMovies(query = "popular") {
      try {
        const res = await fetch(`${API_BASE}/search?query=${query}`);
        const data = await res.json();
        return data.results || data;
      } catch(e) {
        console.error("Erro na API", e);
        return [];
      }
    }

    function createCard(movie) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${movie.image || 'https://via.placeholder.com/240x360?text=Sem+Imagem'}" alt="${movie.title}">
      `;
      card.onclick = () => showModal(movie);
      return card;
    }

    function showModal(movie) {
      document.getElementById('modal-backdrop').src = movie.image || '';
      document.getElementById('modal-title').textContent = movie.title || 'Sem título';
      document.getElementById('modal-overview').textContent = movie.description || 'Sem descrição disponível.';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function loadContent() {
      // Hero
      const trending = await fetchMovies("trending");
      if (trending.length > 0) {
        const hero = trending[0];
        document.getElementById('hero').style.backgroundImage = `url(${hero.image})`;
        document.getElementById('hero-title').textContent = hero.title;
        document.getElementById('hero-overview').textContent = (hero.description || '').substring(0, 180) + '...';
      }

      // Fileiras
      const categories = [
        {id: 'trending', query: 'trending'},
        {id: 'popular', query: 'popular'},
        {id: 'action', query: 'action'},
        {id: 'drama', query: 'drama'}
      ];

      for (let cat of categories) {
        const movies = await fetchMovies(cat.query);
        const container = document.getElementById(cat.id);
        container.innerHTML = '';
        movies.slice(0, 12).forEach(movie => {
          container.appendChild(createCard(movie));
        });
      }
    }

    // Busca em tempo real
    document.getElementById('searchInput').addEventListener('input', async (e) => {
      const term = e.target.value.trim();
      if (term.length < 2) return;
      
      const results = await fetchMovies(term);
      // Você pode criar uma seção de resultados ou usar um modal, mas por enquanto só log
      console.log("Resultados da busca:", results);
    });

    // Iniciar
    loadContent();
  </script>
</body>
</html>
