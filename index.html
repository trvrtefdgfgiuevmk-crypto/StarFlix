<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarFlix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root { --red: #e50914; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #141414;
      color: white;
      overflow-x: hidden;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: #000;
      z-index: 2000;
      padding-top: 20px;
    }
    .logo {
      font-size: 2.4rem;
      font-weight: bold;
      color: var(--red);
      padding: 0 25px 40px;
    }
    .menu-item {
      padding: 14px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .menu-item:hover { background: #333; }

    /* Top Bar */
    header {
      position: fixed;
      top: 0;
      left: 240px;
      right: 0;
      height: 68px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      display: flex;
      align-items: center;
      padding: 0 40px;
      z-index: 1500;
    }
    .search-bar {
      background: rgba(255,255,255,0.15);
      border: none;
      padding: 10px 20px;
      width: 420px;
      border-radius: 6px;
      color: white;
      font-size: 1rem;
    }

    .hero {
      height: 95vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      padding: 0 60px;
      position: relative;
    }
    .hero-content { max-width: 620px; }
    .hero h1 { font-size: 4.8rem; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }

    .row {
      padding: 30px 60px;
      margin-top: -90px;
      position: relative;
    }
    .row h2 { margin-bottom: 18px; font-size: 1.7rem; }
    .carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
    }
    .card {
      min-width: 230px;
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.4s;
      cursor: pointer;
    }
    .card:hover { transform: scale(1.22); z-index: 10; }
    .card img { width: 100%; display: block; }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      width: 85%;
      max-width: 950px;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }

    .loading { text-align: center; padding: 50px; font-size: 1.4rem; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">STARFLIX</div>
    <div class="menu-item"><i class="fas fa-home"></i> Início</div>
    <div class="menu-item"><i class="fas fa-search"></i> Buscar</div>
    <div class="menu-item"><i class="fas fa-film"></i> Filmes</div>
    <div class="menu-item"><i class="fas fa-tv"></i> Séries</div>
    <div class="menu-item"><i class="fas fa-heart"></i> Minha Lista</div>
  </div>

  <header>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar filmes e séries...">
  </header>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1 id="hero-title">StarFlix</h1>
      <p id="hero-overview">Carregando conteúdo...</p>
    </div>
  </section>

  <div id="content">
    <!-- As fileiras serão inseridas aqui via JS -->
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button onclick="closeModal()" style="position:absolute;top:20px;right:25px;font-size:2.5rem;background:none;border:none;color:white;cursor:pointer;">×</button>
      <img id="modal-img" style="width:100%; height:460px; object-fit:cover;">
      <div style="padding:30px;">
        <h1 id="modal-title" style="font-size:2.8rem;margin-bottom:15px;"></h1>
        <p id="modal-desc" style="font-size:1.1rem;line-height:1.5;"></p>
      </div>
    </div>
  </div>

  <script>
    // Dados de fallback (caso a API falhe)
    const fallbackMovies = [
      {title: "Duna: Parte Dois", img: "https://image.tmdb.org/t/p/w500/1XDDXPXGiSTpZ1n4Z8fQ8vJ2w8M.jpg", desc: "Paul Atreides une forças com Chani e os Fremen."},
      {title: "Deadpool & Wolverine", img: "https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t6EDMUBjM.jpg", desc: "O mercenário boca suja e o Wolverine juntos."},
      {title: "Furiosa", img: "https://image.tmdb.org/t/p/w500/iXU8XhVqY5zq6X7fJq4K8z8z8z8.jpg", desc: "A origem da guerreira Furiosa."},
      {title: "Oppenheimer", img: "https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2d.jpg", desc: "A história do pai da bomba atômica."},
      {title: "The Batman", img: "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg", desc: "O Cavaleiro das Trevas retorna."}
    ];

    async function fetchWithTimeout(url, timeout = 8000) {
      const controller = new AbortController();
      setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(url, {signal: controller.signal});
        return res.ok ? await res.json() : null;
      } catch {
        return null;
      }
    }

    function createCard(movie) {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<img src="${movie.img || movie.image}" alt="${movie.title}">`;
      div.onclick = () => showModal(movie);
      return div;
    }

    function showModal(movie) {
      document.getElementById('modal-img').src = movie.img || movie.image || 'https://via.placeholder.com/900x460';
      document.getElementById('modal-title').textContent = movie.title;
      document.getElementById('modal-desc').textContent = movie.desc || movie.description || "Sem descrição disponível.";
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function loadRows() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Carregando conteúdo...</div>';

      let movies = [];

      // Tenta pegar da API
      try {
        const data = await fetchWithTimeout('https://imdb.iamidiotareyoutoo.com/search?query=popular');
        if (data && data.results) movies = data.results;
      } catch(e) {}

      // Se falhar, usa fallback
      if (movies.length === 0) {
        movies = fallbackMovies;
      }

      const categories = ["Em Alta", "Populares", "Ação", "Drama", "Recomendados para Você"];

      let html = '';
      categories.forEach(title => {
        html += `
          <section class="row">
            <h2>${title}</h2>
            <div class="carousel" id="${title}"></div>
          </section>`;
      });
      content.innerHTML = html;

      // Preenche as fileiras
      categories.forEach(title => {
        const container = document.getElementById(title);
        movies.forEach(m => {
          container.appendChild(createCard(m));
        });
      });

      // Hero com primeiro filme
      const hero = movies[0];
      document.getElementById('hero').style.backgroundImage = `url(${hero.img || hero.image})`;
      document.getElementById('hero-title').textContent = hero.title;
      document.getElementById('hero-overview').textContent = hero.desc || hero.description || '';
    }

    // Busca
    document.getElementById('searchInput').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const term = e.target.value.trim();
        if (term) alert(`Buscando por: ${term} (funcionalidade em desenvolvimento)`);
      }
    });

    // Inicia
    loadRows();
  </script>
</body>
</html>
